name: kaizen
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  provider: ^6.1.1
  flutter_native_splash: ^2.3.1
  firebase_core: ^4.6.0
  cloud_firestore: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#F5F1E7"
  image: assets/logo.png
  android_12:
    image: assets/logo.png
    color: "#F5F1E7"

flutter:
  uses-material-design: true
  assets:
    - assets/
